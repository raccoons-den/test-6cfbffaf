# ~~ Generated by projen. To modify, edit .projenrc.ts and run "npx projen".

name: release
on:
  workflow_dispatch: {}
  pull_request:
    types:
      - closed
    branches:
      - main
    paths:
      - src/**
      - content/**
      - static/**
      - contentspec.yaml
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  release:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    outputs:
      latest_commit: ${{ steps.git_remote.outputs.latest_commit }}
      tag_exists: ${{ steps.check_tag_exists.outputs.exists }}
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set git identity
        run: |-
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Install dependencies
        run: yarn install --check-files --frozen-lockfile
      - name: release
        run: npx projen release
      - name: Check if version has already been tagged
        id: check_tag_exists
        run: |-
          TAG=$(cat dist/releasetag.txt)
          ([ ! -z "$TAG" ] && git ls-remote -q --exit-code --tags origin $TAG && (echo "exists=true" >> $GITHUB_OUTPUT)) || (echo "exists=false" >> $GITHUB_OUTPUT)
          cat $GITHUB_OUTPUT
      - name: Check for new commits
        id: git_remote
        run: |-
          echo "latest_commit=$(git ls-remote origin -h ${{ github.ref }} | cut -f1)" >> $GITHUB_OUTPUT
          cat $GITHUB_OUTPUT
        shell: bash
      - name: Backup artifact permissions
        if: ${{ steps.git_remote.outputs.latest_commit == github.sha }}
        run: cd dist && getfacl -R . > permissions-backup.acl
        continue-on-error: true
      - name: Upload artifact
        if: ${{ steps.git_remote.outputs.latest_commit == github.sha }}
        uses: actions/upload-artifact@v7
        with:
          name: build-artifact
          path: dist
          overwrite: true
    if: github.event.pull_request.merged == true
  release_github:
    name: Publish to GitHub Releases
    needs: release
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    if: needs.release.outputs.tag_exists != 'true' && needs.release.outputs.latest_commit == github.sha
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          package-manager-cache: "false"
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifact
          path: dist
      - name: Restore build artifact permissions
        run: cd dist && setfacl --restore=permissions-backup.acl
        continue-on-error: true
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |-
          errout=$(mktemp)
                RELEASE_TAG=$(cat dist/releasetag.txt)
                
                # Check if this is a prerelease by looking for hyphen in tag (e.g., v1.0.0-alpha)
                if [[ "$RELEASE_TAG" == *"-"* ]]; then
                  echo "Creating prerelease: $RELEASE_TAG"
                  gh release create "$RELEASE_TAG" \
                    --title "$RELEASE_TAG" \
                    --prerelease \
                    -R $GITHUB_REPOSITORY \
                    -F dist/changelog.md \
                    --target $GITHUB_REF \
                    dist/content.zip 2> $errout && true
                else
                  echo "Creating release: $RELEASE_TAG"
                  gh release create "$RELEASE_TAG" \
                    --title "$RELEASE_TAG" \
                    -R $GITHUB_REPOSITORY \
                    -F dist/changelog.md \
                    --target $GITHUB_REF \
                    dist/content.zip 2> $errout && true
                fi
                
                exitcode=$?
                if [ $exitcode -ne 0 ] && ! grep -q "Release.tag_name already exists" $errout; then
                  cat $errout
                  exit $exitcode
                fi
